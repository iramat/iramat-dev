<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arrow Steps SVG</title>
</head>
<body style="margin:24px; background:#f2f2f2; font-family:Arial, sans-serif;">

  <svg width="1220" height="130" viewBox="0 0 1220 130" xmlns="http://www.w3.org/2000/svg" aria-label="Five-step arrow process">
    <!-- Step 1 -->
    <polygon points="0,10 230,10 275,55 230,100 0,100"
             fill="#4A74BF"/>
    <text x="123" y="61" text-anchor="middle" dominant-baseline="middle"
          font-size="22" fill="white">1</text>

    <!-- Step 2 -->
    <polygon points="225,10 455,10 500,55 455,100 225,100 270,55"
             fill="#ED7D31" stroke="#F2F2F2" stroke-width="2"/>
    <text x="350" y="61" text-anchor="middle" dominant-baseline="middle"
          font-size="22" fill="white">2</text>

    <!-- Step 3 -->
    <polygon points="450,10 680,10 725,55 680,100 450,100 495,55"
             fill="#FFC000" stroke="#F2F2F2" stroke-width="2"/>
    <text x="575" y="61" text-anchor="middle" dominant-baseline="middle"
          font-size="22" fill="white">3</text>

    <!-- Step 4 -->
    <polygon points="675,10 905,10 950,55 905,100 675,100 720,55"
             fill="#5A8C36" stroke="#F2F2F2" stroke-width="2"/>
    <text x="800" y="61" text-anchor="middle" dominant-baseline="middle"
          font-size="22" fill="white">4</text>

    <!-- Step 5 -->
    <polygon points="900,10 1130,10 1175,55 1130,100 900,100 945,55"
             fill="#7030A0" stroke="#F2F2F2" stroke-width="2"/>
    <text x="1025" y="61" text-anchor="middle" dominant-baseline="middle"
          font-size="22" fill="white">5</text>
  </svg>

</body>
</html>
