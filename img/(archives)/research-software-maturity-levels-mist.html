<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maturity Levels</title>
    <style>
        .maturity-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100px;
        }

        .maturity-arrow {
            display: flex;
            align-items: center;
            height: 60px;
            position: relative;
        }

        .arrow {
            width: 0;
            height: 0;
            border-top: 30px solid transparent;
            border-bottom: 30px solid transparent;
            border-left: 60px solid;
            margin-right: -20px;
            z-index: 2;
        }

        .arrow-body {
            width: 120px;
            height: 60px;
            position: relative;
            z-index: 1;
        }

        .step {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .arrow-blue {
            border-left-color: #3498db;
        }

        .arrow-blue .arrow-body {
            background-color: #3498db;
        }

        .arrow-orange {
            border-left-color: #e67e22;
        }

        .arrow-orange .arrow-body {
            background-color: #e67e22;
        }

        .arrow-yellow {
            border-left-color: #f1c40f;
        }

        .arrow-yellow .arrow-body {
            background-color: #f1c40f;
        }

        .arrow-green {
            border-left-color: #27ae60;
        }

        .arrow-green .arrow-body {
            background-color: #27ae60;
        }

        .arrow-purple {
            border-left-color: #9b59b6;
        }

        .arrow-purple .arrow-body {
            background-color: #9b59b6;
        }
    </style>
</head>
<body>
    <div class="maturity-container">
        <div class="maturity-arrow">
            <div class="arrow arrow-blue"></div>
            <div class="arrow-body arrow-blue">
                <div class="step">1</div>
            </div>
        </div>
        <div class="maturity-arrow">
            <div class="arrow arrow-orange"></div>
            <div class="arrow-body arrow-orange">
                <div class="step">2</div>
            </div>
        </div>
        <div class="maturity-arrow">
            <div class="arrow arrow-yellow"></div>
            <div class="arrow-body arrow-yellow">
                <div class="step">3</div>
            </div>
        </div>
        <div class="maturity-arrow">
            <div class="arrow arrow-green"></div>
            <div class="arrow-body arrow-green">
                <div class="step">4</div>
            </div>
        </div>
        <div class="maturity-arrow">
            <div class="arrow arrow-purple"></div>
            <div class="arrow-body arrow-purple">
                <div class="step">5</div>
            </div>
        </div>
    </div>
</body>
</html>
